# Auto-deploy the client to GitHub Pages on every push to main.
#
# One-time setup before this works:
#   Repo → Settings → Pages → Source: "GitHub Actions" (NOT "Deploy from a
#   branch"). After the first workflow run the site will be available at
#     https://<user>.github.io/<repo>/
#   which for this repo is
#     https://johnchampaign.github.io/tyrants-of-the-underdark/
#
# That's it — no API tokens or secrets to add. Every push to main builds and
# deploys automatically; you can also run it on demand via the Actions tab.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# GitHub Pages requires these specific permissions to publish from Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; queue new runs but cancel in-progress
# ones so the most recent push wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # The in-app problem-report and game-log uploaders look for a
          # Cloudflare-Worker relay URL here. Leave it unset and those
          # uploaders just no-op in production (which is fine — they're
          # nice-to-have telemetry, not core gameplay).
          VITE_TOTU_RELAY_URL: ${{ vars.VITE_TOTU_RELAY_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload built artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
